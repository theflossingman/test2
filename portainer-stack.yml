version: '3.8'

services:
  aura-os:
    image: ghcr.io/YOUR_USERNAME/aura-os:latest
    container_name: aura-os
    ports:
      - "3002:3002"
    volumes:
      - /synology/maxdocker/auraos:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3002
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/api/aura', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - aura-network

networks:
  aura-network:
    driver: bridge

# Optional: Add reverse proxy configuration
# Uncomment and modify if you have Traefik or Nginx
# labels:
#   - "traefik.enable=true"
#   - "traefik.http.routers.aura-os.rule=Host(`aura.yourdomain.com`)"
#   - "traefik.http.routers.aura-os.entrypoints=websecure"
#   - "traefik.http.routers.aura-os.tls=true"
#   - "traefik.http.services.aura-os.loadbalancer.server.port=3002"
